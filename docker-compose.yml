version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sis_db
    environment:
      POSTGRES_DB: sis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2134
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sis_app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/sis_db
      DB_USERNAME: postgres
      DB_PASSWORD: 2134
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
    depends_on:
      - db

volumes:
  postgres_data: